services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_adventure_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_adventure_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
